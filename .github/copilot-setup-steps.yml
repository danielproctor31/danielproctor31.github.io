steps:
  - name: Setup pnpm
    uses: pnpm/action-setup@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 24
      cache: pnpm

  - name: Install dependencies
    run: pnpm install --frozen-lockfile

  - name: Rebuild native dependencies
    run: pnpm rebuild better-sqlite3
